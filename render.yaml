services:
  - type: web
    name: leadhive-api
    env: python
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: leadhive-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: EMAIL_SENDING_ENABLED
        value: false

databases:
  - name: leadhive-db
    plan: starter

